name: Build Note20 Exynos990 Kernel

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
    - name: Checkout Source
      uses: actions/checkout@v4
      with:
        repository: n0n3m4/kernel_samsung_exynos990
        ref: main
        path: kernel
        fetch-depth: 1

    - name: Build Kernel
      run: |
        cd kernel
        sudo apt-get update
        sudo apt-get install -y build-essential bc flex bison libssl-dev libelf-dev clang lld llvm
        
        export ARCH=arm64
        export CROSS_COMPILE=aarch64-linux-gnu-
        
        # 1. 설정 파일 적용 (노트20은 보통 c1s_defconfig 사용)
        make O=out $ARCH CROSS_COMPILE=$CROSS_COMPILE c1s_defconfig
        
        # 2. 빌드 시작
        make -j$(nproc) O=out $ARCH CROSS_COMPILE=$CROSS_COMPILE

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: kernel-result
        path: kernel/out/arch/arm64/boot/Image
