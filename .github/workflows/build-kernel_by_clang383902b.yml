name: Build Note20 Kernel

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
    - uses: actions/checkout@v4

    - name: Download kernel source
      uses: actions/checkout@v4
      with:
        repository: samsungopensource/samsung-kernel-n98x
        ref: main
        path: kernel_workspace/android-kernel
        fetch-depth: 1

    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt install -y build-essential bc flex bison libssl-dev libelf-dev clang lld llvm

    - name: Download Clang Toolchain
      run: |
        mkdir -p $GITHUB_WORKSPACE/kernel_workspace/clang-aosp
        git clone https://github.com/tomxi1997/Toolchain.git $GITHUB_WORKSPACE/kernel_workspace/clang-aosp --depth=1

    - name: Build Kernel
      run: |
        cd $GITHUB_WORKSPACE/kernel_workspace/android-kernel
        export PATH=$GITHUB_WORKSPACE/kernel_workspace/clang-aosp/google_clang/clang-r383902b-11.0.2/bin:$PATH
        
        # 삼성 기기는 defconfig가 arch/arm64/configs/ 에 있습니다.
        # n981(노트20)용 설정을 사용합니다.
        make O=out ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- CC=clang c1s_defconfig
        make -j$(nproc) O=out ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- CC=clang

    - name: Upload Result
      uses: actions/upload-artifact@v4
      with:
        name: kernel-image
        path: kernel_workspace/android-kernel/out/arch/arm64/boot/Image
