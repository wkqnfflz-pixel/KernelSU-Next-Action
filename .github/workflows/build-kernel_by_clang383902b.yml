name: Build kernel by clang-r383902b

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
    - uses: actions/checkout@v4

    - name: Download kernel source
      run: |
        mkdir -p $GITHUB_WORKSPACE/kernel_workspace
        cd $GITHUB_WORKSPACE/kernel_workspace
        # 삼성 갤럭시 노트 20(sm8250)용 커널 소스를 가져옵니다.
        git clone https://github.com/Yg0801/android_kernel_samsung_msm8250.git -b thirteen android-kernel --depth=1

    - name: Setup build kernel environment
      run: |
        sudo apt-get update
        sudo apt install -y curl python2 llvm lld wget vim git ccache automake flex lzop bison gperf build-essential zip zlib1g-dev g++-multilib libxml2-utils bzip2 libbz2-dev libbz2-1.0 libghc-bzlib-dev squashfs-tools pngcrush schedtool dpkg-dev liblz4-tool make optipng maven libssl-dev pwgen libswitch-perl policycoreutils minicom libxml-sax-base-perl libxml-simple-perl bc libc6-dev-i386 lib32ncurses5-dev x11proto-core-dev libx11-dev lib32z-dev libgl1-mesa-dev xsltproc unzip device-tree-compiler kmod python3 python3-pip

    - name: Download clang-383902b
      run: |
        cd $GITHUB_WORKSPACE/kernel_workspace
        mkdir clang-aosp
        git clone https://github.com/tomxi1997/Toolchain.git clang-aosp --depth=1

    - name: Build kernel
      run: |
        cd $GITHUB_WORKSPACE/kernel_workspace/android-kernel
        export KBUILD_BUILD_HOST=Github-Action
        export KBUILD_BUILD_USER=$(echo ${{ github.actor }} | tr A-Z a-z)
        export PATH=$GITHUB_WORKSPACE/kernel_workspace/clang-aosp/google_clang/clang-r383902b-11.0.2/bin:$PATH
        
        # 노트 20 모델에 맞는 설정 파일을 자동으로 탐색하여 빌드
        # c1s, d2s, t2s 등 모델별 defconfig가 존재하므로 이를 자동 적용
        DEFCONFIG=$(ls arch/arm64/configs/vendor/*_defconfig | head -n 1)
        echo "선택된 설정 파일: $DEFCONFIG"
        
        make -j$(nproc --all) O=out ARCH=arm64 CROSS_COMPILE=aarch64-linux-android- CROSS_COMPILE_ARM32=arm-linux-androideabi- $(basename $DEFCONFIG)
        make -j$(nproc --all) O=out ARCH=arm64 CROSS_COMPILE=aarch64-linux-android- CROSS_COMPILE_ARM32=arm-linux-androideabi-

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: kernel-build-result
        path: kernel_workspace/android-kernel/out/arch/arm64/boot/Image
